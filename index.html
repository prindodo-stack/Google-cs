<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이모두 Google 관리 서비스 신청</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; }
        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .device-img { transition: transform 0.3s ease; }
        .group:hover .device-img { transform: scale(1.05); }
    </style>
</head>
<body class="min-h-screen py-8 px-4">
    <div class="max-w-2xl mx-auto">
        <!-- 신청서 헤더 -->
        <div class="bg-blue-700 rounded-t-xl p-8 text-white shadow-lg border-b border-blue-800">
            <div class="flex items-center mb-4">
                <span class="bg-blue-500 text-white text-[10px] font-bold px-2 py-1 rounded-md mr-2 uppercase tracking-wider">Management Service</span>
                <h1 class="text-2xl font-bold tracking-tight">아이모두 Google 관리 서비스 신청</h1>
            </div>
            <p class="text-blue-100 text-sm leading-relaxed">
                본 페이지는 학교 담당자가 <strong>아이모두 Google 관리자</strong>에게 기기 관리 정책 적용을 공식적으로 요청하는 신청 시스템입니다.
            </p>
            <p class="text-blue-200 text-[11px] mt-4 opacity-90 font-medium tracking-tight text-right">Made by 교육연구사 이정도</p>
        </div>

        <div class="bg-white rounded-b-xl shadow-md p-8">
            <form id="surveyForm">
                <!-- STEP 1: 기기 선택 -->
                <div id="sectionDevice" class="step-content active">
                    <div class="flex items-center justify-between mb-6 border-b pb-4">
                        <h2 class="text-lg font-bold text-gray-800">STEP 1. 관리 대상 기기 선택</h2>
                        <span class="text-xs font-medium text-blue-600 bg-blue-50 px-2 py-1 rounded">필수 선택</span>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <label class="relative block cursor-pointer group">
                            <input type="radio" name="deviceType" value="Chromebook" class="peer absolute opacity-0">
                            <div class="p-6 border-2 border-gray-100 rounded-2xl peer-checked:border-blue-500 peer-checked:bg-blue-50 hover:border-blue-200 transition-all text-center shadow-sm h-full flex flex-col items-center justify-center">
                                <div class="w-32 h-24 bg-white rounded-xl flex items-center justify-center mb-4 overflow-hidden border border-gray-50">
                                    <img src="https://search.pstatic.net/sunny/?src=https%3A%2F%2Fimages.samsung.com%2Fkdp%2Fcms_contents%2F103300%2F7ec882df-a5c3-4245-b9a0-237c69195532.jpg%3F%24FB_TYPE_A_JPG%24&type=sc960_832" alt="Chromebook" class="device-img w-full h-full object-contain">
                                </div>
                                <h3 class="font-bold text-gray-900 text-lg">크롬북 (Chromebook)</h3>
                                <p class="text-xs text-gray-400 mt-2">ChromeOS 전용 관리 서비스</p>
                            </div>
                        </label>

                        <label class="relative block cursor-pointer group">
                            <input type="radio" name="deviceType" value="Android" class="peer absolute opacity-0">
                            <div class="p-6 border-2 border-gray-100 rounded-2xl peer-checked:border-blue-500 peer-checked:bg-blue-50 hover:border-blue-200 transition-all text-center shadow-sm h-full flex flex-col items-center justify-center">
                                <div class="w-32 h-24 bg-white rounded-xl flex items-center justify-center mb-4 overflow-hidden border border-gray-50">
                                    <img src="https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2FMjAyMDA1MTNfNDYg%2FMDAxNTg5MzY3MjEzMjUx.kaJREo1gzQe_dghObB8EtOmh5VCu3coUS989fSxyC2cg._xjuq5iJ2h8vOt_HyIjnbLyXOQn1Ti9tfg_-QDWXUa0g.PNG.gkqudgh6881%2F20200513194146.png&type=a340" alt="Android" class="device-img w-full h-full object-contain">
                                </div>
                                <h3 class="font-bold text-gray-900 text-lg">안드로이드 (Tablet)</h3>
                                <p class="text-xs text-gray-400 mt-2">안드로이드 태블릿 통합 관리</p>
                            </div>
                        </label>
                    </div>

                    <button type="button" onclick="handleDeviceSelection()" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold hover:bg-blue-800 transition-all shadow-lg text-lg">다음 단계로 이동</button>
                </div>

                <!-- 크롬북 신청 섹션 -->
                <div id="sectionChromebook" class="step-content">
                    <div class="flex items-center justify-between mb-6 border-b pb-4">
                        <h2 class="text-lg font-bold text-gray-800 tracking-tight">크롬북 관리 서비스 신청</h2>
                        <button type="button" onclick="goToStep('device')" class="text-xs text-blue-600 font-medium underline tracking-tight">기기 변경</button>
                    </div>

                    <div class="space-y-6">
                        <div class="bg-blue-50 p-5 rounded-xl border border-blue-100">
                            <p class="text-xs font-bold text-blue-800 mb-3 tracking-tight">기존 기기 등록 계정 도메인 선택 (G열)</p>
                            <div class="space-y-3">
                                <label class="flex items-center cursor-pointer p-2 rounded hover:bg-blue-100 transition-colors">
                                    <input type="radio" name="chromebookDomain" value="Standard" class="w-4 h-4 text-blue-600">
                                    <span class="ml-3 text-sm text-gray-700 font-medium">교육청 통합 도메인 (@m.jne.go.kr / @e.jne.go.kr / @h.jne.go.kr)</span>
                                </label>
                                <label class="flex items-center cursor-pointer p-2 rounded hover:bg-blue-100 transition-colors">
                                    <input type="radio" name="chromebookDomain" value="SchoolSpecific" class="w-4 h-4 text-blue-600">
                                    <span class="ml-3 text-sm text-gray-700 font-medium">학교 자체 도메인 (예: @dysb.ms.jne.kr 등)</span>
                                </label>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">소속 학교</label>
                                <input type="text" id="schoolChrome" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="학교명">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">담당자 이름</label>
                                <input type="text" id="nameChrome" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="성함">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">전화번호</label>
                                <input type="tel" id="phoneChrome" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="010-0000-0000">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">등록 요청 대수</label>
                                <input type="number" id="countChrome" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="예: 30">
                            </div>
                        </div>

                        <button type="submit" id="submitBtnChrome" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold hover:bg-blue-800 shadow-md text-lg">신청 완료</button>
                    </div>
                </div>

                <!-- 안드로이드 관리 방식 선택 -->
                <div id="sectionAndroidSelection" class="step-content">
                    <div class="flex items-center justify-between mb-6 border-b pb-4">
                        <h2 class="text-lg font-bold text-gray-800 tracking-tight">안드로이드 관리 방식 선택</h2>
                        <button type="button" onclick="goToStep('device')" class="text-xs text-blue-600 font-medium underline tracking-tight">기기 변경</button>
                    </div>
                    
                    <div class="space-y-4 mb-8">
                        <label class="relative block group cursor-pointer">
                            <input type="radio" name="policy" value="Option A" class="peer absolute opacity-0">
                            <div class="p-6 border-2 border-gray-100 rounded-xl peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all hover:border-blue-200 shadow-sm">
                                <h3 class="font-bold text-gray-900 mb-2">Option A. 개방형 자율 관리</h3>
                                <p class="text-xs text-gray-500">학생 자유 설치 허용, 기기 초기화 불필요</p>
                            </div>
                        </label>
                        <label class="relative block group cursor-pointer">
                            <input type="radio" name="policy" value="Option B" class="peer absolute opacity-0">
                            <div class="p-6 border-2 border-gray-100 rounded-xl peer-checked:border-red-500 peer-checked:bg-red-50 transition-all hover:border-red-200 shadow-sm">
                                <h3 class="font-bold text-gray-900 mb-2">Option B. 집중형 중앙 관리</h3>
                                <p class="text-xs text-gray-500">관리자 승인 앱만 허용, 기기 초기화 필수</p>
                            </div>
                        </label>
                    </div>

                    <button type="button" onclick="handleAndroidPolicySelection()" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold hover:bg-blue-800 shadow-lg text-lg">신청 정보 작성하기</button>
                </div>

                <!-- 안드로이드 상세 신청 -->
                <div id="sectionAndroidDetails" class="step-content">
                    <div class="flex items-center justify-between mb-6 border-b pb-4">
                        <h2 id="androidDetailsTitle" class="text-lg font-bold text-gray-800 tracking-tight">안드로이드 상세 신청</h2>
                        <button type="button" onclick="goToStep('android-selection')" class="text-xs text-blue-600 font-medium underline tracking-tight">방식 변경</button>
                    </div>

                    <div class="space-y-6">
                        <div id="androidNotice" class="p-4 rounded-lg border">
                            <label class="flex items-start cursor-pointer">
                                <input type="checkbox" id="agreeAndroid" class="mt-1 w-4 h-4 rounded">
                                <span id="agreeAndroidText" class="ml-3 text-sm leading-relaxed font-medium text-gray-700"></span>
                            </label>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">소속 학교</label>
                                <input type="text" id="schoolAndroid" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 outline-none" placeholder="학교명">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">담당자 성함</label>
                                <input type="text" id="nameAndroid" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 outline-none" placeholder="성함">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">전화번호</label>
                                <input type="tel" id="phoneAndroid" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 outline-none" placeholder="010-0000-0000">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">관리 대상 대수</label>
                                <input type="number" id="countAndroid" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 outline-none" placeholder="예: 30">
                            </div>
                        </div>

                        <div id="androidExtraField" class="hidden">
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">배포 희망 앱 리스트</label>
                            <textarea id="appsAndroid" rows="4" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 outline-none text-sm" placeholder="앱 이름을 쉼표로 구분하여 입력"></textarea>
                        </div>

                        <button type="submit" id="submitBtnAndroid" class="w-full text-white py-4 rounded-xl font-bold shadow-md text-lg mt-4">신청 완료</button>
                    </div>
                </div>
            </form>

            <!-- 성공 화면 -->
            <div id="successSection" class="step-content text-center py-12">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-green-100 rounded-full mb-6 text-green-600">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-900 mb-3 tracking-tight">신청이 완료되었습니다</h2>
                <p class="text-gray-600 mb-10 text-sm leading-relaxed tracking-tight">아이모두 Google 관리자가 확인 후<br>기재하신 연락처로 안내해 드리겠습니다.</p>
                <button type="button" onclick="location.reload()" class="bg-gray-100 text-gray-600 px-8 py-3 rounded-xl font-bold hover:bg-gray-200 transition-all tracking-tight">다시 신청하기</button>
            </div>
        </div>
    </div>

    <div id="messageBox" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 transition-all pointer-events-none z-50 text-sm font-medium">
        <span id="messageText"></span>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw-rzQxHAY9uGDLsBUZX6oZ_-CP8WRgr3OM4eH8-Rz2CiMt823tVmI8FsEYsUhSNtdQ/exec'; 

        let selectedDevice = '';
        let currentAndroidPolicy = '';

        function goToStep(step) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            if (step === 'device') document.getElementById('sectionDevice').classList.add('active');
            else if (step === 'chromebook') document.getElementById('sectionChromebook').classList.add('active');
            else if (step === 'android-selection') document.getElementById('sectionAndroidSelection').classList.add('active');
            else if (step === 'android-details') document.getElementById('sectionAndroidDetails').classList.add('active');
            else if (step === 'success') document.getElementById('successSection').classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function handleDeviceSelection() {
            const types = document.getElementsByName('deviceType');
            for (const t of types) {
                if (t.checked) {
                    selectedDevice = t.value;
                    if (selectedDevice === 'Chromebook') goToStep('chromebook');
                    else goToStep('android-selection');
                    return;
                }
            }
            showMessage("⚠️ 기기를 선택해 주세요.");
        }

        function handleAndroidPolicySelection() {
            const policies = document.getElementsByName('policy');
            for (const p of policies) {
                if (p.checked) {
                    currentAndroidPolicy = p.value;
                    setupAndroidDetails(currentAndroidPolicy);
                    goToStep('android-details');
                    return;
                }
            }
            showMessage("⚠️ 방식을 선택해 주세요.");
        }

        function setupAndroidDetails(policy) {
            const title = document.getElementById('androidDetailsTitle');
            const notice = document.getElementById('androidNotice');
            const agreeText = document.getElementById('agreeAndroidText');
            const extra = document.getElementById('androidExtraField');
            const btn = document.getElementById('submitBtnAndroid');

            if (policy === 'Option A') {
                title.innerText = "Option A. 개방형 관리 신청";
                notice.className = "p-4 rounded-lg border bg-gray-50 border-gray-200";
                agreeText.innerText = "자유로운 앱 설치에 따른 기기 관리 책임이 학교에 있음을 확인합니다.";
                extra.classList.add('hidden');
                btn.className = "w-full bg-blue-700 text-white py-4 rounded-xl font-bold hover:bg-blue-800 transition-all shadow-md text-lg mt-4";
            } else {
                title.innerText = "Option B. 집중형 관리 신청";
                notice.className = "p-4 rounded-lg border bg-red-50 border-red-100";
                agreeText.innerHTML = "중앙 관리를 위한 <strong>기기 공장 초기화</strong> 및 등록 프로세스에 동의합니다.";
                extra.classList.remove('hidden');
                btn.className = "w-full bg-red-700 text-white py-4 rounded-xl font-bold hover:bg-red-800 transition-all shadow-md text-lg mt-4";
            }
        }

        function showMessage(text) {
            const box = document.getElementById('messageBox');
            document.getElementById('messageText').innerText = text;
            box.style.opacity = '1';
            setTimeout(() => box.style.opacity = '0', 3000);
        }

        document.getElementById('surveyForm').onsubmit = function(e) {
            e.preventDefault();
            
            // 폼 제출 로직 개선: 선택된 기기에 따라 데이터 수집 대상을 명확히 분리
            let payload = { deviceType: selectedDevice };
            let activeBtn = null;

            if (selectedDevice === 'Chromebook') {
                const domainOption = document.querySelector('input[name="chromebookDomain"]:checked');
                if (!domainOption) return showMessage("도메인 유형을 선택해 주세요.");
                
                const school = document.getElementById('schoolChrome');
                const name = document.getElementById('nameChrome');
                const phone = document.getElementById('phoneChrome');
                const count = document.getElementById('countChrome');

                if (!school.value || !name.value || !phone.value || !count.value) {
                    return showMessage("✍️ 모든 필수 항목을 입력해 주세요.");
                }

                payload.policy = 'Chromebook Standard';
                payload.domainType = domainOption.value === 'Standard' ? '전남교육청 통합' : '학교 자체';
                payload.schoolName = school.value;
                payload.teacherName = name.value;
                payload.phoneNumber = phone.value;
                payload.deviceCount = count.value;
                payload.agreement = 'Domain Checked';
                payload.additionalApps = "-";
                activeBtn = document.getElementById('submitBtnChrome');
            } else if (selectedDevice === 'Android') {
                const agree = document.getElementById('agreeAndroid');
                if (!agree || !agree.checked) return showMessage("동의 체크가 필요합니다.");
                
                const school = document.getElementById('schoolAndroid');
                const name = document.getElementById('nameAndroid');
                const phone = document.getElementById('phoneAndroid');
                const count = document.getElementById('countAndroid');
                const apps = document.getElementById('appsAndroid');

                if (!school.value || !name.value || !phone.value || !count.value) {
                    return showMessage("✍️ 모든 필수 항목을 입력해 주세요.");
                }

                payload.policy = currentAndroidPolicy;
                payload.domainType = "-";
                payload.schoolName = school.value;
                payload.teacherName = name.value;
                payload.phoneNumber = phone.value;
                payload.deviceCount = count.value;
                payload.agreement = 'Policy Agreed';
                payload.additionalApps = currentAndroidPolicy === 'Option B' ? apps.value : "-";
                activeBtn = document.getElementById('submitBtnAndroid');
            } else {
                return showMessage("⚠️ 기기 선택 단계부터 다시 진행해 주세요.");
            }

            const originalText = activeBtn.innerText;
            activeBtn.disabled = true;
            activeBtn.innerHTML = `<span class="loading-spinner"></span>제출 중...`;

            const params = new URLSearchParams();
            for (const key in payload) params.append(key, payload[key]);

            fetch(scriptURL, { method: 'POST', body: params, mode: 'no-cors' })
            .then(() => {
                goToStep('success');
            })
            .catch(error => {
                console.error('Submission Error:', error);
                showMessage("❌ 전송 오류가 발생했습니다.");
                activeBtn.disabled = false;
                activeBtn.innerText = originalText;
            });
        };
    </script>
</body>
</html>
